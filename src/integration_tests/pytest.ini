[pytest]
# Pytest configuration for integration tests

# Django settings
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = ../

# Test discovery
testpaths = .

# Markers
markers =
    integration: Integration tests that require a running server
    live_server: Tests that use pytest-django's live_server fixture
    git_provider: Tests that require git provider configuration
    slow: Tests that take a long time to run

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Coverage options (optional)
# --cov=../
# --cov-report=html
# --cov-report=term-missing

# Parallel execution (optional)
# -n auto

# Live server configuration
# --liveserver=localhost:8000-8010
